<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — استماع</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23201a;
    --parchment:#f6efdd;
    --parchment-deep:#efe6cd;
    --green-deep:#0e3b2c;
    --green:#155940;
    --green-light:#1f7a57;
    --gold:#c79a3a;
    --gold-light:#e6c574;
    --card:#fffdf7;
    --muted:#8a8272;
    --heading:#0e3b2c;
    --shadow: 0 10px 30px rgba(14,59,44,.18);
    --radius: 14px;
  }
  html.dark{
    --ink:#ece7d9;
    --parchment:#141b1a;
    --parchment-deep:#1d2725;
    --green-deep:#0a2e22;
    --green:#123f2e;
    --green-light:#1f7a57;
    --gold:#c79a3a;
    --gold-light:#e6c574;
    --card:#1b2422;
    --muted:#a9b5ad;
    --heading:#e6c574;
    --shadow: 0 10px 30px rgba(0,0,0,.5);
  }
  html.dark body{
    background:
      radial-gradient(1200px 500px at 15% -10%, rgba(199,154,58,.08), transparent 60%),
      radial-gradient(1000px 400px at 100% 0%, rgba(21,89,64,.18), transparent 55%),
      var(--parchment);
  }
  html.dark .panel{border-color: rgba(199,154,58,.12);}
  html.dark .surah-card{border-color: rgba(199,154,58,.1);}
  html.dark .search-box input{border-color: rgba(199,154,58,.25); color:var(--ink);}
  html{transition: none;}
  body, .panel, .player, .surah-card, .reciter-item, .search-box input{transition: background .25s ease, border-color .25s ease, color .25s ease;}
  *{box-sizing:border-box;}
  *{
    -webkit-user-select:none; -moz-user-select:none; -ms-user-select:none; user-select:none;
  }
  input, textarea, select{
    -webkit-user-select:text; -moz-user-select:text; -ms-user-select:text; user-select:text;
  }
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(1200px 500px at 15% -10%, rgba(199,154,58,.10), transparent 60%),
      radial-gradient(1000px 400px at 100% 0%, rgba(21,89,64,.12), transparent 55%),
      var(--parchment);
    color:var(--ink);
    font-family:'Tajawal', sans-serif;
    min-height:100vh;
  }
  ::selection{background:var(--gold-light);}

  /* ---------- geometric pattern helper ---------- */
  .pattern-strip{
    height:10px;
    background-image: repeating-linear-gradient(135deg, var(--gold) 0 6px, transparent 6px 12px);
    opacity:.55;
  }

  /* ---------- header ---------- */
  header{
    background: linear-gradient(180deg, var(--green-deep), var(--green));
    color:#f4ecd7;
    padding: 28px 24px 34px;
    position:relative;
    overflow:hidden;
  }
  header::after{
    content:"";
    position:absolute; inset:0;
    background-image: radial-gradient(circle at 20px 20px, rgba(255,255,255,.05) 1.5px, transparent 1.6px);
    background-size: 26px 26px;
    pointer-events:none;
  }
  .header-inner{
    max-width:1180px; margin:0 auto;
    display:flex; align-items:center; justify-content:center; gap:16px; flex-wrap:wrap;
    position:relative; z-index:1;
  }
  .brand{display:flex; align-items:center; gap:4px; text-align:center; flex-direction:column;}
  .brand h1{
    font-family:'Amiri', serif;
    margin:0; font-size:34px; font-weight:700; letter-spacing:.5px;
    color:#f9f1dc;
  }
  .brand p{margin:2px 0 0; font-size:13px; color:#cfe0d3; font-weight:300;}
  /* ---------- mobile tabs ---------- */
  .mobile-tabs{
    display:none;
    max-width:1180px; margin:14px auto 0; padding:0 20px;
    gap:8px;
  }
  .tab-btn{
    flex:1; padding:11px 10px; border-radius:12px; border:1px solid rgba(14,59,44,.15);
    background:var(--card); color:var(--muted); font-family:'Tajawal'; font-weight:700; font-size:14px;
    cursor:pointer; transition:.15s;
  }
  .tab-btn.active{
    background: linear-gradient(180deg, var(--green), var(--green-deep));
    color:#f4ecd7; border-color: var(--gold);
    box-shadow: 0 4px 12px rgba(14,59,44,.25);
  }

  /* ---------- layout ---------- */
  .layout{
    max-width:1180px; margin:0 auto; padding:22px 20px 160px;
    display:grid; grid-template-columns: 300px 1fr; gap:20px;
  }
  @media (max-width: 860px){
    .layout{grid-template-columns: 1fr;}
    .mobile-tabs{display:flex;}
    .panel-reciters, .panel-surahs{display:none;}
    .panel-reciters.tab-active, .panel-surahs.tab-active{display:block;}
  }

  .panel{
    background:var(--card);
    border-radius:var(--radius);
    box-shadow: var(--shadow);
    border:1px solid rgba(14,59,44,.08);
    overflow:hidden;
  }
  .panel-head{
    padding:16px 18px 10px;
    display:flex; align-items:center; justify-content:space-between;
  }
  .panel-head h2{
    font-family:'Amiri', serif;
    margin:0; font-size:19px; color:var(--heading);
  }
  .count-pill{
    font-size:11px; background:var(--parchment-deep); color:var(--heading);
    padding:3px 9px; border-radius:20px; font-weight:700;
  }
  .search-box{
    margin:0 18px 12px; position:relative;
  }
  .search-box input{
    width:100%; padding:9px 34px 9px 12px; border-radius:10px;
    border:1px solid rgba(14,59,44,.18); background:var(--parchment);
    font-family:'Tajawal'; font-size:13.5px; color:var(--ink); outline:none;
  }
  .search-box input:focus{border-color:var(--gold); box-shadow:0 0 0 3px rgba(199,154,58,.18);}
  .search-box svg{position:absolute; left:10px; top:50%; transform:translateY(-50%); opacity:.5;}

  /* ---------- reciters list ---------- */
  #reciterList{
    max-height:640px; overflow-y:auto; padding: 0 10px 14px;
  }
  #reciterList::-webkit-scrollbar, #surahGrid::-webkit-scrollbar{width:7px;}
  #reciterList::-webkit-scrollbar-thumb{background:var(--parchment-deep); border-radius:10px;}

  .reciter-item{
    display:flex; align-items:center; gap:10px;
    padding:10px 10px; border-radius:10px; cursor:pointer;
    margin-bottom:3px; transition:.15s;
    border:1px solid transparent;
  }
  .reciter-item:hover{background:var(--parchment);}
  .reciter-item.active{
    background: linear-gradient(90deg, rgba(199,154,58,.16), rgba(199,154,58,.05));
    border-color: rgba(199,154,58,.4);
  }
  .reciter-avatar{
    width:36px;height:36px;border-radius:50%; flex-shrink:0;
    background:linear-gradient(160deg, var(--green-light), var(--green-deep));
    color:#f4ecd7; display:flex; align-items:center; justify-content:center;
    font-family:'Amiri'; font-weight:700; font-size:15px;
  }
  .reciter-item.active .reciter-avatar{
    background:linear-gradient(160deg, var(--gold-light), var(--gold));
    color:var(--green-deep);
  }
  .reciter-name{font-size:14px; font-weight:500; line-height:1.35;}
  .reciter-riwaya{font-size:11px; color:var(--muted); margin-top:1px;}

  .loading-row{padding:16px 18px; font-size:13px; color:#7d7562; display:flex; align-items:center; gap:8px;}
  .spinner{
    width:14px;height:14px;border-radius:50%;
    border:2px solid rgba(14,59,44,.2); border-top-color:var(--green);
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg);}}

  /* ---------- surah grid ---------- */
  #surahGrid{
    max-height:640px; overflow-y:auto;
    display:grid; grid-template-columns: repeat(auto-fill, minmax(230px,1fr));
    gap:10px; padding: 4px 18px 20px;
  }
  .surah-card{
    display:flex; align-items:center; gap:12px;
    background:var(--parchment); border:1px solid rgba(14,59,44,.08);
    border-radius:12px; padding:10px 12px; cursor:pointer;
    transition:.15s;
  }
  .surah-card:hover{transform:translateY(-2px); box-shadow:0 6px 14px rgba(14,59,44,.12); border-color:rgba(199,154,58,.5);}
  .surah-card.playing{
    background:linear-gradient(90deg, rgba(21,89,64,.12), rgba(199,154,58,.14));
    border-color: var(--gold);
  }
  .surah-card.disabled{opacity:.35; cursor:not-allowed; pointer-events:none;}
  .surah-num{
    width:34px;height:34px; border-radius:50%; flex-shrink:0;
    background:var(--green-deep); color:#f4ecd7;
    display:flex; align-items:center; justify-content:center;
    font-size:13px; font-weight:700;
    position:relative;
  }
  .surah-card.playing .surah-num{background:var(--gold);color:#0e3b2c;}
  .surah-info{overflow:hidden;}
  .surah-name{font-family:'Amiri', serif; font-size:16.5px; font-weight:700; color:var(--heading); white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .surah-meta{font-size:11px; color:var(--muted); margin-top:1px;}
  .eq{display:flex; align-items:flex-end; gap:2px; height:12px; margin-inline-start:auto;}
  .eq span{width:2.5px; background:var(--gold); border-radius:2px; animation:eqbar .9s ease-in-out infinite;}
  .eq span:nth-child(2){animation-delay:.15s;}
  .eq span:nth-child(3){animation-delay:.3s;}
  @keyframes eqbar{0%,100%{height:3px;}50%{height:12px;}}

  /* ---------- player bar (mihrab) ---------- */
  .player-wrap{
    position:fixed; bottom:0; left:0; right:0; z-index:50;
    display:flex; justify-content:center;
    padding: 0 14px 14px;
    pointer-events:none;
  }
  .player{
    pointer-events:auto;
    width:100%; max-width:900px;
    background: linear-gradient(180deg, var(--green), var(--green-deep));
    border-radius: 20px 20px 20px 20px;
    box-shadow: 0 16px 40px rgba(14,59,44,.4);
    padding: 14px 18px;
    position:relative;
    border:1px solid rgba(199,154,58,.35);
  }
  .player::before{
    /* mihrab arch accent on top edge */
    content:"";
    position:absolute; top:-14px; left:50%; transform:translateX(-50%);
    width:64px; height:14px;
    background:var(--green-deep);
    border-radius: 40px 40px 0 0;
    border:1px solid rgba(199,154,58,.35);
    border-bottom:none;
  }
  .player-top{display:flex; align-items:center; gap:14px;}
  .player-extras{display:flex; align-items:center; gap:10px; flex-shrink:0;}
  .play-btn{
    width:52px;height:52px;border-radius:50%; flex-shrink:0;
    background: radial-gradient(circle at 35% 30%, var(--gold-light), var(--gold));
    border:none; cursor:pointer; display:flex; align-items:center; justify-content:center;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
    transition:.15s;
  }
  .play-btn:hover{transform:scale(1.06);}
  .play-btn svg{width:20px;height:20px;}
  .nav-btn{
    width:36px;height:36px;border-radius:50%; border:1px solid rgba(244,236,215,.25);
    background:rgba(244,236,215,.08); cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:#f4ecd7; flex-shrink:0; transition:.15s;
  }
  .nav-btn:hover{background:rgba(244,236,215,.18);}
  .nav-btn:disabled{opacity:.3; cursor:not-allowed;}

  .now-info{flex:1; min-width:0; color:#f4ecd7;}
  .now-reciter{font-family:'Amiri',serif; font-size:17px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; color:#f4ecd7;}

  .vol-wrap{display:flex; align-items:center; gap:6px; color:#e7dcb8;}
  .vol-wrap input[type=range]{width:70px; accent-color:var(--gold);}

  .sleep-wrap{
    display:flex; align-items:center; gap:9px; color:#e7dcb8;
    background:rgba(244,236,215,.08); border:1px solid rgba(244,236,215,.18);
    border-radius:26px; padding:10px 16px; flex-shrink:0;
  }
  .sleep-wrap svg{width:22px; height:22px; flex-shrink:0;}
  .sleep-wrap input[type=number]{
    width:90px; background:transparent; border:none; outline:none;
    color:#f4ecd7; font-family:'Tajawal'; font-size:15px; font-weight:500;
    -moz-appearance:textfield;
  }
  .sleep-wrap input[type=number]::-webkit-outer-spin-button,
  .sleep-wrap input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none; margin:0;}
  .sleep-wrap input[type=number]::placeholder{color:#ffffff; opacity:1;}
  #sleepCountdown{font-size:13.5px; font-weight:700; color:var(--gold-light); white-space:nowrap;}
  .sleep-wrap.active{border-color:var(--gold); background:rgba(199,154,58,.12);}

  a.sleep-wrap{text-decoration:none; cursor:pointer; transition:.15s;}
  a.sleep-wrap:hover{background:rgba(244,236,215,.18); border-color:rgba(244,236,215,.35);}
  #radioLabel{font-size:14px; font-weight:600; color:#f4ecd7; white-space:nowrap;}

  .theme-btn{
    width:44px;height:44px;border-radius:50%; flex-shrink:0;
    background:rgba(244,236,215,.08); border:1px solid rgba(244,236,215,.18);
    cursor:pointer; display:flex; align-items:center; justify-content:center;
    color:#e7dcb8; transition:.15s;
  }
  .theme-btn:hover{background:rgba(244,236,215,.18); transform:scale(1.06);}
  .theme-btn svg{width:20px;height:20px;}
  .theme-btn:disabled{opacity:.4; cursor:not-allowed; transform:none;}
  .theme-btn.downloading svg{animation: spin 0.9s linear infinite;}

  .progress-row{display:flex; align-items:center; gap:10px; margin-top:10px; color:#e7dcb8; font-size:11px;}
  input#seek{
    -webkit-appearance:none; flex:1; height:5px; border-radius:5px;
    background: rgba(244,236,215,.25); outline:none; cursor:pointer;
  }
  input#seek::-webkit-slider-thumb{
    -webkit-appearance:none; width:13px;height:13px;border-radius:50%;
    background:var(--gold-light); border:2px solid var(--green-deep); cursor:pointer;
  }
  .time{width:40px; text-align:center; flex-shrink:0;}

  .empty-state{padding:40px 20px; text-align:center; color:var(--muted);}
  .empty-state .icon{font-size:36px; margin-bottom:8px;}

  .note{
    max-width:1180px; margin:0 auto; padding:0 20px; font-size:12px; color:var(--muted); text-align:center;
  }

  @media (max-width:600px){
    #surahGrid{grid-template-columns: repeat(auto-fill, minmax(150px,1fr));}
    .now-reciter{font-size:15px;}

    .layout{padding-bottom:230px; padding-top:12px;}
    header{padding:14px 16px 16px;}
    .brand{gap:1px;}
    .brand h1{font-size:22px;}
    .mobile-tabs{margin-top:8px;}
    .player{padding:12px 14px;}
    .player-top{flex-wrap:wrap; row-gap:12px; justify-content:center;}
    .now-info{order:3; flex-basis:100%; min-width:100%; text-align:center;}
    .player-extras{order:4; flex-basis:100%; min-width:100%; justify-content:center; flex-wrap:wrap; row-gap:10px;}
    .vol-wrap{display:flex;}
    .vol-wrap input[type=range]{width:100px;}
    .sleep-wrap{padding:7px 12px;}
    .sleep-wrap svg{width:18px; height:18px;}
    .sleep-wrap input[type=number]{width:66px; font-size:13px;}
    #radioLabel{font-size:12.5px;}
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div class="brand">
      <h1>القرآن الكريم</h1>
    </div>
  </div>
</header>
<div class="pattern-strip"></div>

<div class="mobile-tabs" id="mobileTabs">
  <button class="tab-btn active" data-tab="surahs">فهرس السور</button>
  <button class="tab-btn" data-tab="reciters">القرّاء</button>
</div>

<div class="layout">

  <!-- Reciters panel -->
  <div class="panel panel-reciters">
    <div class="panel-head">
      <h2>القرّاء</h2>
      <span class="count-pill" id="reciterCountPill">…</span>
    </div>
    <div class="search-box">
      <input id="reciterSearch" type="text" placeholder="ابحث عن قارئ…">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="reciterList">
      <div class="loading-row"><div class="spinner"></div> جارِ تحميل قائمة القرّاء…</div>
    </div>
  </div>

  <!-- Surahs panel -->
  <div class="panel panel-surahs tab-active">
    <div class="panel-head">
      <h2 id="surahPanelTitle">السور</h2>
      <span class="count-pill">114</span>
    </div>
    <div class="search-box">
      <input id="surahSearch" type="text" placeholder="ابحث عن سورة بالاسم أو الرقم…">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="color:var(--muted)" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    </div>
    <div id="surahGrid"></div>
  </div>

</div>

<div class="note" id="apiNote"></div>

<!-- Player -->
<div class="player-wrap">
  <div class="player">
    <div class="player-top">
      <button class="nav-btn" id="prevBtn" title="السورة السابقة">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#f4ecd7"><path d="M6 6h2v12H6zM10 12l8-6v12z"/></svg>
      </button>
      <button class="play-btn" id="playBtn" title="تشغيل/إيقاف">
        <svg id="playIcon" viewBox="0 0 24 24" fill="#0e3b2c"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="nav-btn" id="nextBtn" title="السورة التالية">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="#f4ecd7"><path d="M16 6h2v12h-2zM6 6l8 6-8 6z"/></svg>
      </button>

      <div class="now-info">
        <div class="now-reciter" id="nowReciter">لم يتم اختيار قارئ بعد</div>
      </div>

      <div class="player-extras">
        <div class="sleep-wrap" id="sleepWrap">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e7dcb8" stroke-width="2"><circle cx="12" cy="13" r="8"/><path d="M12 9v4l3 2"/><path d="M9 2h6"/></svg>
          <input type="number" id="sleepInput" min="1" max="300" placeholder="مؤقت النوم" title="اكتب عدد الدقائق ثم انتظر">
          <span id="sleepCountdown"></span>
